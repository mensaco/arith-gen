<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arith-gen</title>
</head>

<body x-data="arith">

      <div class="print:hidden m-3">
        <button class="bg-violet-200 text-violet-800 px-3 py-1 rounded" @click="document.location = '/triangles'">&rarr; triangles</button>
    </div>

  <div class="w-full flex gap-x-16 items-center p-5 print:hidden ">
    <div class="md:flex md:items-center mb-6">
      <div class="md:w-1/3">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Count
        </label>
      </div>
      <div class="md:w-2/3">
        <input @change="save()" class="w-24 text-center bg-gray-200 appearance-none border-2 border-gray-200 rounded py-2 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_count" min="1">
      </div>
    </div>
    <div class="md:flex md:items-center mb-6">
      <div class="md:w-1/3">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Min
        </label>
      </div>
      <div class="md:w-2/3">
        <input @change="save()" class="w-24 text-center bg-gray-200 appearance-none border-2 border-gray-200 rounded py-2 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_min" min="0" :max="arguments_max">
      </div>
    </div>
    <div class="md:flex md:items-center mb-6">
      <div class="md:w-1/3">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Max
        </label>
      </div>
      <div class="md:w-2/3">
        <input @change="save()" class="w-24 text-center bg-gray-200 appearance-none border-2 border-gray-200 rounded py-2 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_max" :min="arguments_min">
      </div>
    </div>
    <div class="md:flex md:items-center mb-6 gap-x-1">
      <div class="md:w-1/3">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Operation
        </label>
      </div>
      <div class="md:w-2/3">
        <select @change="save()" class="bg-gray-200 appearance-none border-2 border-gray-200 rounded w-full py-2 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" x-model="currentOperation">
          <template x-for="op in ops">
            <option x-text="op" :value="op" :selected="op == currentOperation"></option>
          </template>
        </select>
      </div>
    </div>
    <div class="h-12" title="addition: sum never exceeds max; subtraction: no negative results">
      <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Safe operation <input @change="save()" type="checkbox" x-model="safeOperation">
        </label>
    </div>


  </div>

  <div class="flex flex-wrap m-7 gap-x-8 gap-y-2 mx-auto text-xl font-semibold">




    <template x-for="line in lines">
      <div class="flex justify-between px-7 w-36">

        <div class="flex justify-center">
          <div x-text="line.a" class="text-right"></div>
        </div>

        <div class="flex justify-center">
          <div x-text="line.op"></div>
        </div>
        
        <div class="flex justify-center">
          <div x-text="line.b" class="text-right"></div>
        </div>
        
        <div class="flex justify-center">
          <div x-text="'='"></div>
        </div>
        
        <div class="flex ">
          <div x-text="'_____'"></div>
        </div>

      </div>
    </template>
  </div>
  <script type="module" src="/src/app.js"></script>
</body>

</html>
