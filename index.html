<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arith-gen</title>
</head>

<body x-data="arith">

  <div class="w-full flex gap-x-3 items-center print:hidden ">
    <div class="md:flex md:items-center mb-6">
      <div class="md:w-1/3">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Min
        </label>
      </div>
      <div class="md:w-2/3">
        <input class="bg-gray-200 appearance-none border-2 border-gray-200 rounded w-full py-2 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments.min">
      </div>
    </div>
    <div class="md:flex md:items-center mb-6">
      <div class="md:w-1/3">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Max
        </label>
      </div>
      <div class="md:w-2/3">
        <input class="bg-gray-200 appearance-none border-2 border-gray-200 rounded w-full py-2 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments.max">
      </div>
    </div>
    <div class="md:flex md:items-center mb-6">
      <div class="md:w-1/3">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Operation
        </label>
      </div>
      <div class="md:w-2/3">
        <select class="bg-gray-200 appearance-none border-2 border-gray-200 rounded w-full py-2 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" x-model="currentOperation">
          <template x-for="op in Object.keys(operations)">
            <option x-text="op" :value="op"></option>
          </template>
        </select>
      </div>
    </div>


  </div>

  <div class="print:size-A4L grid grid-cols-7 m-7 mx-auto text-xl font-semibold">




    <template x-for="line in lines">
      <div class="grid grid-cols-5 px-7">

        <div class="flex justify-center">
          <div x-text="line.a" class="text-right"></div>
        </div>

        <div class="flex justify-center">
          <div x-text="line.op"></div>
        </div>
        
        <div class="flex justify-center">
          <div x-text="line.b" class="text-right"></div>
        </div>
        
        <div class="flex justify-center">
          <div x-text="'='"></div>
        </div>
        
        <div class="flex ">
          <div x-text="'_____'"></div>
        </div>

      </div>
    </template>
  </div>
  <script type="module" src="/src/app.js"></script>
</body>

</html>
