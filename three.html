<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body x-data="triangle">
    
    <div class="print:hidden m-3">
        <button class="bg-violet-200 text-violet-800 px-3 py-1 rounded" @click="document.location = '/'">&rarr;  arithmetics</button>
    </div>
    <div class="print:hidden m-3">
        <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="refresh()">refresh</button>
        <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="showResults^=true" x-text="showResultsLabel">show results</button>
        <template x-if="showCompareButton"><button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="compare^=true" x-text="compareLabel">compare</button></template>
        <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="window.print()">print</button>
    </div>

    <div class="grid grid-cols-3 w-[210mm] relative">
        <template x-for="(d,i) in tdata" :key="i">
            <div class="relative p-7">
                <img src="/svg/triangle.svg">

                <div x-text="d.a" class="absolute text-lg w-10 h-10 border p-1 rounded text-center top-[20mm] left-[9mm]"></div>
                <div x-text="d.b" class="absolute text-lg w-10 h-10 border p-1 rounded text-center top-[20mm] right-[9mm]"></div>
                <div x-text="d.c" class="absolute text-lg w-10 h-10 border p-1 rounded text-center top-[58mm] left-[30mm]"></div>
            
                <div x-show="showResults" x-text="d.x" class="absolute text-lg w-10 h-10 p-1 text-center top-[20mm] left-[29mm]"></div>
                <div x-show="showResults" x-text="d.y" class="absolute text-lg w-10 h-10 p-1 text-center top-[40mm] left-[19mm]"></div>
                <div x-show="showResults" x-text="d.z" class="absolute text-lg w-10 h-10 p-1 text-center top-[40mm] right-[19mm]"></div>

                <input x-show="!showResults" x-model="d.input_x" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[20mm] left-[29mm]" :class="docompare(d.input_x, d.x)">
                <input x-show="!showResults" x-model="d.input_y" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[40mm] left-[19mm]" :class="docompare(d.input_y, d.y)">
                <input x-show="!showResults" x-model="d.input_z" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[40mm] right-[19mm]" :class="docompare(d.input_z, d.z)">

            
            </div>
        </template>

    </div>
    <script type="module" src="/src/appt.js"></script>
</body>
</html>
