<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arith-gen</title>
  <script type="module" crossorigin src="/assets/main-54w3_A0u.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/module.esm-D80CIpuo.js">
  <link rel="stylesheet" crossorigin href="/assets/module-Cu2hT4TK.css">
</head>

<body x-data="arith" class="bg-gray-100 print:bg-white">

  <div class="w-[210mm] mx-auto bg-white">
    <div class="print:hidden m-3">
      <button class="bg-violet-200 text-violet-800 px-3 py-1 rounded" @click="document.location = '/triangles'">&rarr; triangles</button>
    </div>

    <div class="w-full flex flex-wrap gap-x-6 items-center p-5 print:hidden ">
      <div class="md:flex md:items-center mb-6">
        <div class="">
          <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
            Count
          </label>
        </div>
        <div class="">
          <input class="w-18 text-center appearance-none border border-gray-300 rounded p-1 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" @change="restrainCount()" x-model="arguments_count" min="1" max="100">
        </div>
      </div>
      <div class="md:flex md:items-center mb-6">
        <div>
          <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
            Min
          </label>
        </div>
        <div class="md:w-2/3">
          <input class="w-18 text-center appearance-none border border-gray-300 rounded p-1 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_min" min="0" :max="arguments_max">
        </div>
      </div>
      <div class="md:flex md:items-center mb-6">
        <div>
          <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
            Max
          </label>
        </div>
        <div class="md:w-2/3">
          <input class="w-18 text-center appearance-none border border-gray-300 rounded p-1 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_max" :min="arguments_min" max="100">
        </div>
      </div>
      <div class="md:flex md:items-center mb-6 gap-x-1">
        <div>
          <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
            Operation
          </label>
        </div>
        <div class="md:w-2/3">
          <select class="appearance-none border border-gray-300 rounded w-full p-1 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" x-model="currentOperation">
            <template x-for="op in ops">
              <option x-text="op" :value="op" :selected="op == currentOperation"></option>
            </template>
          </select>
        </div>
      </div>
      <div class="h-12" title="addition: sum never exceeds max; subtraction: no negative results">
        <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
          Safe operation <input type="checkbox" x-model="safeOperation">
        </label>
      </div>


    </div>

    <div class="print:hidden m-3">
      <hr class="m-1">
      <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="showNext()" x-text="showInputsLabel">show results</button>
      <template x-if="show == SHOW.INPUTS"><button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="compare^=true" x-text="compareLabel">compare</button></template>
      <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="window.print()">print</button>
    </div>

    <div class="grid grid-cols-4 m-7 gap-x-12 gap-y-2 mx-auto text-xl font-semibold">

      <template x-for="line in lines">

        <div class="grid grid-cols-5 ml-3 mr-5">

          <div class="text-right" x-text="line.a">
          </div>

          <div class="text-center inline w-8"  x-text="line.sign">

          </div>

          <div class="text-right w-6" x-text="line.b">
          </div>

          <div class="text-center w-6">=</div>

          <template x-if="show == SHOW.EMPTY"><div class="bg-gray-100 w-10 h-8 border-b border-gray-400"></div></template>
          <template x-if="show == SHOW.RESULTS"><div class="w-8 h-8 text-right" x-text="line.result"></div></template>
          <template x-if="show == SHOW.INPUTS"><input class="border print:border-2 border-gray-400 rounded w-10 h-8 text-right p-1" :class="docompare(line.input_result, line.result)" x-model="line.input_result"></template>

        </div>
      </template>
    </div>
    <div x-text="document.location.toString()" class="italic text-gray-500 font-sm m-3 text-center"></div>

  </div>
</body>

</html>
