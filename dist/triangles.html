<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script type="module" crossorigin src="/assets/triangles-CTA2CaQB.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/module.esm-HqBKbus0.js">
  <link rel="stylesheet" crossorigin href="/assets/module-Cartvcjs.css">
</head>

<body x-data="triangle"  class="bg-gray-100 print:bg-white">

  <div class="w-[210mm] mx-auto bg-white">
    <div class="print:hidden m-3">
      <button class="bg-violet-200 text-violet-800 px-3 py-1 rounded" @click="document.location = '/'">&rarr; arithmetics</button>
    </div>
    <div class="w-full flex flex-wrap gap-x-6 items-center m-3 print:hidden ">
      <div class="md:flex md:items-center mb-1">
        <div>
          <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
            Count
          </label>
        </div>
        <div>
          <input @change="refresh()" class="w-18 text-center appearance-none border border-gray-300 rounded p-1 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_count" min="1">
        </div>
      </div>
      <div class="md:flex md:items-center mb-1">
        <div>
          <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
            Min
          </label>
        </div>
        <div>
          <input @change="refresh()" class="w-18 text-center appearance-none border border-gray-300 rounded p-1 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_min" min="0" :max="arguments_max">
        </div>
      </div>
      <div class="md:flex md:items-center mb-1">
        <div>
          <label class="block text-gray-500 font-bold md:text-right mb-1 md:mb-0 pr-4" for="inline-full-name">
            Max
          </label>
        </div>
        <div>
          <input @change="refresh()" class="w-18 text-center appearance-none border border-gray-300 rounded p-1 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-purple-500" id="inline-full-name" type="number" x-model="arguments_max" :min="arguments_min">
        </div>
      </div>

    </div>



    <div class="print:hidden m-3">
      <hr class="m-1">
      <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="refresh()">refresh</button>
      <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="showNext()" x-text="showOuterLabel">show outer</button>
      <template x-if="show != SHOW.ALL"><button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="showInputs^=true; showLast = showInputs;" x-text="showInputsLabel">show results</button></template>
      <template x-if="showCompareButton"><button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="compare^=true" x-text="compareLabel">compare</button></template>
      <button class="bg-gray-200 text-gray-800 px-3 py-1 rounded" @click="window.print()">print</button>
    </div>



    <div class="grid grid-cols-3 relative">
      <template x-for="(d,i) in tdata" :key="i">
        <div class="relative p-7">
          <img src="/svg/triangle.svg">

          <template x-if="show == SHOW.OUTER || show == SHOW.ALL">
            <div>
              <input x-model="d.o1" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 rounded text-center top-[20mm] left-[9mm]">
              <input x-model="d.o2" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 rounded text-center top-[20mm] right-[9mm]">
              <input x-model="d.o3" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 rounded text-center top-[58mm] left-[30mm]">
            </div>
          </template>



          <template x-if="show == SHOW.INNER || show == SHOW.ALL">
            <div>
              <input x-model="d.i3" :title="'x'" class="absolute bg-gray-100 text-lg w-10 h-10  p-1 text-center top-[20mm] left-[29mm]">
              <input x-model="d.i2" :title="'y'" class="absolute bg-gray-100 text-lg w-10 h-10  p-1 text-center top-[40mm] left-[19mm]">
              <input x-model="d.i1" :title="'z'" class="absolute bg-gray-100 text-lg w-10 h-10  p-1 text-center top-[40mm] right-[19mm]">
            </div>
          </template>

          <template x-if="showInputs">
            <div>


              <template x-if="show == SHOW.OUTER">
                <div>
                  <input x-model="d.input_i3" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[20mm] left-[29mm]" :class="docompare(d.input_i3, d.i3)">
                  <input x-model="d.input_i2" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[40mm] left-[19mm]" :class="docompare(d.input_i2, d.i2)">
                  <input x-model="d.input_i1" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[40mm] right-[19mm]" :class="docompare(d.input_i1, d.i1)">
                </div>
              </template>
              
              <template x-if="show == SHOW.INNER">
                <div>
                  <input x-model="d.input_o1" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[20mm] left-[9mm]" :class="docompare(d.input_o1, d.o1)">
                  <input x-model="d.input_o2" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[20mm] right-[9mm]" :class="docompare(d.input_o2, d.o2)">
                  <input x-model="d.input_03" class="absolute bg-gray-100 text-lg w-10 h-10 p-1 text-center top-[58mm] left-[30mm]" :class="docompare(d.input_o3, d.o3)">
                </div>
              </template>


            </div>

          </template>




        </div>
      </template>

    </div>
    <div x-text="document.location.toString()" class="italic text-gray-500 font-sm m-3 text-center"></div>
  </div>

</body>

</html>
